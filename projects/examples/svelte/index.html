<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EFSDB Svelte Template</title>
    <style>
      body { margin: 0; padding: 0; }
      #efsdb-initial-loader {
        position: fixed;
        inset: 0;
        background: #f9fafb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.3s ease;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: efsdb-spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      @keyframes efsdb-spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        color: #6b7280;
        font-size: 0.875rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="efsdb-initial-loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading EFSDB</div>
    </div>
    <script>
      if (typeof window !== 'undefined' && !window.__EFSDB__) {
        window.__EFSDB__ = { basePath: '', env: 'dev', route: 'unknown' };
      }
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
